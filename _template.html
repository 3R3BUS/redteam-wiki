<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantablack Wiki — Red Team Reference</title>
<meta name="description" content="Comprehensive red team and offensive security reference. 69+ articles across 24 categories.">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0: #060608; --bg1: #0b0b0f; --bg2: #101014;
  --border: #1a1a22; --red: #cc2222; --red2: #991919;
  --t0: #e8e8f0; --t1: #9898aa; --t2: #585868; --t3: #282838;
  --mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
}
html, body { height: 100%; background: var(--bg0); color: var(--t0); font-family: var(--mono); overflow: hidden; }
#app { display: flex; height: 100vh; }

/* ── SIDEBAR ── */
#sidebar {
  width: 270px; min-width: 270px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100%; background: var(--bg1);
}
#search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); }
#search { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--t0);
  font-family: var(--mono); font-size: 11px; padding: 6px 10px; outline: none; }
#search:focus { border-color: var(--red); }

/* vars panel */
#vars-header {
  display: flex; align-items: center; gap: 6px; padding: 7px 12px;
  cursor: pointer; font-size: 10px; font-weight: 700; color: var(--t2);
  letter-spacing: .10em; border-bottom: 1px solid var(--border);
  user-select: none; background: var(--bg1);
}
#vars-header:hover { color: var(--t1); }
#vars-header .live { margin-left: auto; font-size: 8px; color: var(--red); font-weight: 700; }
#vars-body { border-bottom: 1px solid var(--border); background: var(--bg0); overflow: hidden; }
.var-row { padding: 4px 12px; }
.var-label { font-size: 8px; color: var(--t2); letter-spacing: .06em; margin-bottom: 2px; }
.var-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--t0);
  font-family: var(--mono); font-size: 10px; padding: 4px 8px; outline: none; }
.var-input:focus { border-color: var(--red); }
#vars-reset { margin: 6px 12px 8px; background: none; border: 1px solid var(--border); color: var(--t2);
  font-family: var(--mono); font-size: 9px; padding: 3px 8px; cursor: pointer; }
#vars-reset:hover { color: var(--t0); border-color: var(--t2); }

/* nav */
#nav { flex: 1; overflow-y: auto; }
#nav::-webkit-scrollbar { width: 4px; }
#nav::-webkit-scrollbar-track { background: var(--bg1); }
#nav::-webkit-scrollbar-thumb { background: var(--border); }
.cat-header {
  display: flex; align-items: center; gap: 6px; padding: 7px 12px;
  cursor: pointer; font-size: 10px; font-weight: 700; color: var(--t2);
  letter-spacing: .10em; border-bottom: 1px solid var(--border);
  user-select: none;
}
.cat-header:hover { color: var(--t1); }
.cat-arrow { font-size: 8px; transition: transform .15s; }
.cat-header.collapsed .cat-arrow { transform: rotate(-90deg); }
.cat-articles { }
.art-item {
  padding: 6px 12px 6px 24px; cursor: pointer; font-size: 11px; color: var(--t1);
  border-left: 2px solid transparent; border-bottom: 1px solid var(--border);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: background .1s;
}
.art-item:hover { background: #0c0c10; color: var(--t0); }
.art-item.active { background: #0c0c10; color: var(--t0); border-left-color: var(--red); }
.search-result { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border); border-left: 2px solid transparent; }
.search-result:hover, .search-result.active { background: #0c0c10; border-left-color: var(--red); }
.search-result .sr-title { font-size: 11px; color: var(--t0); }
.search-result .sr-meta { font-size: 9px; color: var(--t2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── CONTENT ── */
#content { flex: 1; overflow-y: auto; padding: 28px 32px; background: var(--bg0); }
#content::-webkit-scrollbar { width: 4px; }
#content::-webkit-scrollbar-track { background: var(--bg0); }
#content::-webkit-scrollbar-thumb { background: var(--border); }
.art-breadcrumb { font-size: 10px; color: var(--t2); margin-bottom: 4px; }
.art-breadcrumb .sep { margin: 0 6px; color: var(--t3); }
.art-breadcrumb .art-name { color: var(--t1); }
.art-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.art-date { font-size: 9px; color: var(--t3); }
.art-cat-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border: 1px solid #58586835; color: var(--t2); }
.art-body h1 { font-size: 20px; font-weight: 700; color: var(--t0); margin: 24px 0 10px; }
.art-body h2 { font-size: 16px; font-weight: 700; color: var(--t0); margin: 20px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.art-body h3 { font-size: 14px; font-weight: 700; color: var(--t0); margin: 16px 0 8px; }
.art-body p { font-size: 12px; color: var(--t0); line-height: 1.7; margin: 6px 0; }
.art-body ul { margin: 8px 0; padding-left: 20px; color: var(--t0); font-size: 12px; }
.art-body li { margin-bottom: 3px; line-height: 1.6; }
.art-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.art-body a { color: var(--red); text-decoration: none; }
.art-body a:hover { text-decoration: underline; }
.art-body strong { font-weight: 700; }
.art-body em { font-style: italic; color: var(--t1); }
.art-body code { background: var(--bg2); padding: 1px 5px; border: 1px solid var(--border); font-size: 10px; color: var(--t1); font-family: var(--mono); }
.code-wrap { position: relative; margin-bottom: 14px; }
.code-lang { background: #0a0a0e; border: 1px solid var(--border); border-bottom: none;
  padding: 2px 10px; font-size: 9px; color: var(--t2); letter-spacing: .08em; }
.code-wrap pre {
  background: var(--bg2); border: 1px solid var(--border); padding: 14px; font-size: 11px;
  color: var(--t1); overflow-x: auto; font-family: var(--mono); line-height: 1.55; margin: 0;
  white-space: pre; tab-size: 4;
}
.copy-btn {
  position: absolute; top: 4px; right: 4px; background: var(--bg1); border: 1px solid var(--border);
  color: var(--t2); font-family: var(--mono); font-size: 8px; padding: 2px 7px; cursor: pointer;
  letter-spacing: .06em; transition: color .1s;
}
.code-lang ~ .copy-btn { top: 28px; }
.copy-btn:hover { color: var(--t0); }
.copy-btn.copied { color: var(--red); }
table { border-collapse: collapse; width: 100%; font-size: 11px; margin-bottom: 14px; }
th { border: 1px solid var(--border); padding: 5px 10px; text-align: left; color: var(--t0); background: var(--bg2); font-weight: 700; font-size: 10px; }
td { border: 1px solid var(--border); padding: 5px 10px; color: var(--t1); }
tr:hover td { background: #0c0c12; }
#empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--t3); font-size: 13px; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search 69 articles..." autocomplete="off" spellcheck="false">
    </div>
    <div id="vars-header" onclick="toggleVars()">
      <span class="cat-arrow" id="vars-arrow">▼</span>
      TARGET VARIABLES
      <span class="live">LIVE</span>
    </div>
    <div id="vars-body">
      <div id="vars-rows"></div>
      <button id="vars-reset" onclick="resetVars()">RESET</button>
    </div>
    <div id="nav"></div>
  </div>
  <div id="content"><div id="empty">← Select an article</div></div>
</div>

<script>
const WIKI = __WIKI_DATA__;

// ── VARIABLES ──────────────────────────────────────────────
const DEFAULT_VARS = {
  TARGET_IP: '192.168.1.10',
  LHOST: '192.168.1.50',
  LPORT: '4444',
  DOMAIN: 'corp.local',
  DC_IP: '192.168.1.10',
  USERNAME: 'user',
  PASSWORD: 'password',
};
let vars = { ...DEFAULT_VARS };
let varsOpen = true;
let currentSlug = null;

function applyVars(text) {
  return Object.entries(vars).reduce((t, [k, v]) => t.split(k).join(v), text);
}

function buildVarsPanel() {
  const rows = document.getElementById('vars-rows');
  rows.innerHTML = '';
  Object.entries(DEFAULT_VARS).forEach(([key, def]) => {
    const row = document.createElement('div');
    row.className = 'var-row';
    row.innerHTML = `<div class="var-label">${key}</div>
      <input class="var-input" type="text" spellcheck="false" data-key="${key}" value="${escHtml(vars[key] || def)}">`;
    rows.appendChild(row);
  });
  rows.querySelectorAll('.var-input').forEach(inp => {
    inp.addEventListener('input', e => {
      vars[e.target.dataset.key] = e.target.value;
      if (currentSlug) renderArticle(currentSlug);
    });
  });
}

function toggleVars() {
  varsOpen = !varsOpen;
  document.getElementById('vars-body').style.display = varsOpen ? '' : 'none';
  document.getElementById('vars-arrow').textContent = varsOpen ? '▼' : '▶';
}

function resetVars() {
  vars = { ...DEFAULT_VARS };
  buildVarsPanel();
  if (currentSlug) renderArticle(currentSlug);
}

// ── MARKDOWN RENDERER ──────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function inlineMd(text) {
  let s = escHtml(applyVars(text));
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}

function renderMd(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // fenced code block
    if (line.trimStart().startsWith('```')) {
      const lang = line.trimStart().slice(3).trim();
      const codeLines = [];
      i++;
      while (i < lines.length && !lines[i].trimStart().startsWith('```')) {
        codeLines.push(lines[i]);
        i++;
      }
      i++;
      const raw = codeLines.join('\n');
      const code = escHtml(applyVars(raw));
      const id = 'cb' + Math.random().toString(36).slice(2);
      html += `<div class="code-wrap" id="${id}">`;
      if (lang) html += `<div class="code-lang">${escHtml(lang.toUpperCase())}</div>`;
      html += `<pre>${code}</pre>`;
      html += `<button class="copy-btn" onclick="copyCode('${id}')">COPY</button>`;
      html += `</div>`;
      continue;
    }

    // table
    if (line.startsWith('|')) {
      const rows = [];
      while (i < lines.length && lines[i].startsWith('|')) {
        const cells = lines[i].split('|').slice(1,-1).map(c => c.trim());
        if (!cells.every(c => /^[-: ]+$/.test(c))) rows.push(cells);
        i++;
      }
      if (rows.length) {
        html += '<div style="overflow-x:auto;margin-bottom:14px"><table>';
        html += '<thead><tr>' + rows[0].map(c => `<th>${inlineMd(c)}</th>`).join('') + '</tr></thead>';
        html += '<tbody>';
        rows.slice(1).forEach(row => {
          html += '<tr>' + row.map(c => `<td>${inlineMd(c)}</td>`).join('') + '</tr>';
        });
        html += '</tbody></table></div>';
      }
      continue;
    }

    if (line.startsWith('### ')) { html += `<h3>${inlineMd(line.slice(4))}</h3>`; i++; continue; }
    if (line.startsWith('## '))  { html += `<h2>${inlineMd(line.slice(3))}</h2>`; i++; continue; }
    if (line.startsWith('# '))   { html += `<h1>${inlineMd(line.slice(2))}</h1>`; i++; continue; }
    if (line.match(/^---+$/))    { html += '<hr>'; i++; continue; }

    // list
    if (line.trimStart().startsWith('- ')) {
      html += '<ul>';
      while (i < lines.length && lines[i].trimStart().startsWith('- ')) {
        html += `<li>${inlineMd(lines[i].trimStart().slice(2))}</li>`;
        i++;
      }
      html += '</ul>';
      continue;
    }

    if (line.trim() === '') { i++; continue; }
    html += `<p>${inlineMd(line)}</p>`;
    i++;
  }
  return html;
}

function copyCode(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  const text = wrap.querySelector('pre').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = wrap.querySelector('.copy-btn');
    btn.textContent = 'COPIED';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1500);
  }).catch(() => {});
}

// ── NAVIGATION ────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  WIKI.categories.forEach(cat => {
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `<span class="cat-arrow">▼</span> ${escHtml(cat.name.toUpperCase())}`;
    header.onclick = () => {
      const body = header.nextElementSibling;
      const collapsed = body.style.display === 'none';
      body.style.display = collapsed ? '' : 'none';
      header.classList.toggle('collapsed', !collapsed);
    };

    const body = document.createElement('div');
    body.className = 'cat-articles';
    cat.articles.forEach(a => {
      const item = document.createElement('div');
      item.className = 'art-item';
      item.dataset.slug = a.slug;
      item.textContent = a.title;
      item.title = a.title;
      item.onclick = () => loadArticle(a.slug);
      body.appendChild(item);
    });

    nav.appendChild(header);
    nav.appendChild(body);
  });
}

function setActive(slug) {
  document.querySelectorAll('.art-item').forEach(el => {
    el.classList.toggle('active', el.dataset.slug === slug);
  });
}

function loadArticle(slug) {
  currentSlug = slug;
  setActive(slug);
  renderArticle(slug);
  // update URL hash for shareable links
  location.hash = slug;
}

function renderArticle(slug) {
  const a = WIKI.articles[slug];
  if (!a) return;
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="art-breadcrumb">
      <span>${escHtml(a.category)}</span>
      <span class="sep">›</span>
      <span class="art-name">${escHtml(a.title)}</span>
    </div>
    <div class="art-meta">
      <span class="art-date">LAST UPDATED: ${escHtml(a.last_updated)}</span>
      <span class="art-cat-badge">${escHtml(a.category)}</span>
    </div>
    <div class="art-body">${renderMd(a.content)}</div>
  `;
  content.scrollTop = 0;
}

// ── SEARCH ────────────────────────────────────────────────
let searchTimer = null;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const q = this.value.trim().toLowerCase();
  searchTimer = setTimeout(() => doSearch(q), 200);
});

function doSearch(q) {
  const nav = document.getElementById('nav');
  if (!q) { buildNav(); if (currentSlug) setActive(currentSlug); return; }

  const results = [];
  Object.values(WIKI.articles).forEach(a => {
    const haystack = (a.title + ' ' + a.content).toLowerCase();
    if (!haystack.includes(q)) return;
    // find snippet
    const idx = haystack.indexOf(q);
    const start = Math.max(0, idx - 40);
    const snippet = (a.content.replace(/[#`*\n]/g, ' ')).slice(start, start + 100).trim();
    results.push({ slug: a.slug, title: a.title, category: a.category, snippet });
  });

  nav.innerHTML = '';
  if (!results.length) {
    nav.innerHTML = `<div style="padding:14px;color:var(--t3);font-size:11px;text-align:center">No results for "${escHtml(q)}"</div>`;
    return;
  }
  results.slice(0, 40).forEach(r => {
    const el = document.createElement('div');
    el.className = 'search-result' + (r.slug === currentSlug ? ' active' : '');
    el.innerHTML = `<div class="sr-title">${escHtml(r.title)}</div>
      <div class="sr-meta">${escHtml(r.category)} — ${escHtml(r.snippet)}…</div>`;
    el.onclick = () => loadArticle(r.slug);
    nav.appendChild(el);
  });
}

// ── INIT ──────────────────────────────────────────────────
buildVarsPanel();
buildNav();

// load from hash or first article
const initialSlug = location.hash.slice(1) || WIKI.categories[0]?.articles[0]?.slug;
if (initialSlug && WIKI.articles[initialSlug]) {
  loadArticle(initialSlug);
}

// keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    doSearch('');
    document.getElementById('search').blur();
  }
});
</script>
</body>
</html>
